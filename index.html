<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 導入專案儀表板</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: #f5f6f8;
    color: #1f2937;
    line-height: 1.55;
    font-size: 14px;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .header { padding: 22px 24px 16px; border-bottom: 1px solid #f0f1f4; }
  .header h1 { margin: 0 0 6px; font-size: 22px; color: #0f172a; font-weight: 700; }
  .header .meta { display: flex; gap: 20px; font-size: 13px; color: #64748b; flex-wrap: wrap; }
  .header .vision { margin-top: 8px; font-size: 13px; color: #475569; font-style: italic; }

  .toolbar { display: flex; gap: 8px; padding: 12px 24px; background: #fafbfc; border-bottom: 1px solid #f0f1f4; flex-wrap: wrap; }
  .btn {
    padding: 6px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: white;
    color: #334155;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .btn-primary { background: #2563eb; border-color: #2563eb; color: white; }
  .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

  .progress-section { padding: 18px 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-bar { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #10b981); transition: width 0.4s; }

  .kpi-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 0 24px 20px; }
  .kpi { padding: 12px; border-radius: 10px; border: 1px solid #eef0f3; background: white; }
  .kpi-title { font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 4px; }
  .kpi-name { font-size: 13px; color: #0f172a; font-weight: 600; margin-bottom: 6px; }
  .kpi-percent { font-size: 20px; font-weight: 700; color: #0f172a; }
  .kpi-bar { height: 4px; background: #e5e7eb; border-radius: 999px; margin-top: 8px; overflow: hidden; }
  .kpi-bar-fill { height: 100%; transition: width 0.3s; }

  .section-title { padding: 16px 24px 4px; font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }

  .gantt { padding: 8px 24px 24px; }
  .gantt-header {
    display: grid;
    grid-template-columns: 200px repeat(9, 1fr);
    gap: 4px;
    font-size: 11px;
    color: #64748b;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: center;
  }
  .gantt-header > div:first-child { text-align: left; }
  .gantt-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .gantt-label { font-size: 13px; color: #334155; font-weight: 500; padding-left: 4px; }
  .gantt-track { position: relative; height: 28px; background: #f1f5f9; border-radius: 6px; }
  .gantt-bar {
    position: absolute; top: 2px; bottom: 2px;
    border-radius: 5px;
    display: flex; align-items: center; padding: 0 8px;
    color: white; font-size: 11px; font-weight: 600;
    overflow: hidden; white-space: nowrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  .phase {
    background: white;
    border-radius: 12px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(15,23,42,0.05);
    border-left: 4px solid #e5e7eb;
    overflow: hidden;
  }
  .phase-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    cursor: pointer;
    gap: 12px;
    transition: background 0.15s;
  }
  .phase-header:hover { background: #fafbfc; }
  .phase-chevron {
    color: #94a3b8;
    transition: transform 0.2s;
    font-size: 12px;
    width: 14px;
    flex-shrink: 0;
  }
  .phase-chevron.expanded { transform: rotate(90deg); }
  .phase-title-wrap { flex: 1; min-width: 0; }
  .phase-title { font-size: 16px; font-weight: 600; color: #0f172a; }
  .phase-sub { display: flex; gap: 14px; font-size: 12px; color: #64748b; margin-top: 3px; flex-wrap: wrap; }
  .phase-progress-wrap { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .phase-progress-bar { width: 80px; height: 6px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
  .phase-progress-fill { height: 100%; transition: width 0.3s; }
  .phase-progress-text { font-size: 13px; font-weight: 600; color: #334155; min-width: 38px; text-align: right; }

  .status-badge { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-todo { background: #f1f5f9; color: #64748b; }
  .badge-in-progress { background: #dbeafe; color: #1d4ed8; }
  .badge-done { background: #d1fae5; color: #065f46; }

  .phase-body { padding: 0 20px 20px; display: none; }
  .phase-body.expanded { display: block; }

  .block { margin-top: 18px; }
  .block-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .objective-text {
    padding: 12px 14px;
    background: #f8fafc;
    border-radius: 8px;
    font-size: 13px;
    color: #334155;
    border-left: 3px solid #cbd5e1;
  }

  .metrics-list { background: #f8fafc; border-radius: 8px; padding: 4px 12px; }
  .metric { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
  .metric:last-child { border-bottom: none; }
  .metric-name { color: #475569; }
  .metric-target { color: #059669; font-weight: 700; }

  .task-list { border-radius: 8px; overflow: hidden; }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 6px;
    border-bottom: 1px solid #f1f5f9;
  }
  .task:hover { background: #fafbfc; }
  .task:last-child { border-bottom: none; }
  .task-status {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: white;
    font-size: 10px;
    color: white;
    font-weight: 900;
    margin-top: 2px;
    transition: all 0.15s;
  }
  .task-status:hover { border-color: #64748b; }
  .task-status.in-progress { border-color: #3b82f6; background: #3b82f6; }
  .task-status.in-progress::after { content: '●'; font-size: 8px; color: white; }
  .task-status.done { border-color: #10b981; background: #10b981; }
  .task-status.done::after { content: '✓'; }
  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; color: #1f2937; }
  .task-name.done { text-decoration: line-through; color: #94a3b8; }
  .task-note { font-size: 12px; color: #64748b; margin-top: 2px; }
  .task-delete { color: #cbd5e1; cursor: pointer; padding: 2px 8px; font-size: 16px; line-height: 1; user-select: none; }
  .task-delete:hover { color: #ef4444; }

  .add-task {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin-top: 6px;
    font-size: 13px;
    color: #2563eb;
    cursor: pointer;
    border-radius: 6px;
    font-weight: 500;
  }
  .add-task:hover { background: #eff6ff; }

  .risks { padding: 12px 14px; background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 6px; font-size: 13px; }
  .risk-item { margin-bottom: 4px; color: #92400e; }
  .risk-item:last-child { margin-bottom: 0; }

  [contenteditable] {
    outline: none;
    padding: 1px 4px;
    border-radius: 4px;
    transition: background 0.15s;
    cursor: text;
  }
  [contenteditable]:hover { background: #fef3c7; }
  [contenteditable]:focus { background: #fef9c3; box-shadow: 0 0 0 2px #fde047; }

  /* 唯讀模式：關閉所有編輯 UI */
  body:not(.edit-mode) [contenteditable] { cursor: default; }
  body:not(.edit-mode) [contenteditable]:hover,
  body:not(.edit-mode) [contenteditable]:focus { background: transparent; box-shadow: none; }
  body:not(.edit-mode) .task-status { cursor: default; }
  body:not(.edit-mode) .task-delete,
  body:not(.edit-mode) .add-task { display: none !important; }

  .edit-mode-btn { font-weight: 600; }
  .edit-mode-btn.on { background: #fef3c7; border-color: #facc15; color: #78350f; }
  .save-status { display: inline-flex; align-items: center; font-size: 12px; color: #64748b; padding: 0 10px; }
  .save-status.ok { color: #059669; }
  .save-status.err { color: #b91c1c; }

  .tip {
    font-size: 12px;
    color: #713f12;
    padding: 11px 16px;
    background: #fef9c3;
    border-radius: 8px;
    margin-bottom: 16px;
    border-left: 3px solid #eab308;
  }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .gantt-header { grid-template-columns: 120px repeat(9, 1fr); font-size: 10px; }
    .gantt-row { grid-template-columns: 120px 1fr; }
    .gantt-label { font-size: 11px; }
  }

  @media print {
    body { background: white; }
    .toolbar, .tip, .task-delete, .add-task { display: none !important; }
    .phase-body { display: block !important; }
    .card, .phase { box-shadow: none; border: 1px solid #e5e7eb; page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1 contenteditable="true" data-path="project.name">AI 導入專案</h1>
      <div class="meta">
        <span>👤 負責人：<span contenteditable="true" data-path="project.owner">Penny</span></span>
        <span>📅 時程：<span contenteditable="true" data-path="project.timeline">2026/04 - 2026/12（9 個月）</span></span>

    </div>
    <div class="toolbar">
      <button class="btn edit-mode-btn" id="edit-mode-btn" onclick="toggleEditMode()">🔒 唯讀</button>
      <button class="btn" onclick="reloadData()">↻ 重新載入</button>
      <button class="btn btn-primary" onclick="exportJSON()">⬇ 匯出 JSON</button>

        ⬆ 匯入 JSON

      </label>
      <button class="btn" onclick="expandAll()">全部展開</button>
      <button class="btn" onclick="collapseAll()">全部收合</button>
      <button class="btn" onclick="window.print()">🖨 列印</button>
      <span class="save-status" id="save-status"></span>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span><strong>整體進度</strong></span>
        <span id="overall-text">0 / 0 任務 (0%)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="overall-fill" style="width:0%"></div></div>
    </div>
    <div class="section-title">七階段進度</div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <div class="card">

    <div class="gantt" id="gantt"></div>
  </div>

  <div class="tip">

  </div>

  <div id="phases"></div>
</div>

let data = JSON.parse(JSON.stringify(DEFAULT_DATA));

function $(id) { return document.getElementById(id); }

// ====== 編輯模式 / 雲端同步 ======
function isEditMode() {
  return !!(WEBAPP_URL && localStorage.getItem(TOKEN_STORAGE_KEY));
}

function applyEditModeDOM() {
  const inEdit = isEditMode();
  document.body.classList.toggle('edit-mode', inEdit);
  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.contentEditable = inEdit ? 'true' : 'false';
  });
  const btn = $('edit-mode-btn');
  if (btn) {
    btn.textContent = inEdit ? '🔓 編輯中（點擊鎖回）' : '🔒 唯讀';
    btn.classList.toggle('on', inEdit);
  }
}

function setSaveStatus(text, kind) {
  const el = $('save-status');
  if (!el) return;
  el.textContent = text || '';
  el.className = 'save-status' + (kind ? ' ' + kind : '');
}

async function loadData() {
  if (!WEBAPP_URL) return null;
  setSaveStatus('載入中…');
  const res = await fetch(WEBAPP_URL, { method: 'GET' });
  const remote = await res.json();
  if (!remote || !Array.isArray(remote.phases)) {
    throw new Error('資料格式錯誤');
  }
  return remote;
}

async function reloadData() {
  if (!WEBAPP_URL) {
    setSaveStatus('尚未設定 WEBAPP_URL', 'err');
    return;
  }
  try {
    const d = await loadData();
    data = d;
    renderAll();
    applyEditModeDOM();
    setSaveStatus('已載入 ' + new Date().toLocaleTimeString(), 'ok');
  } catch (e) {
    setSaveStatus('載入失敗：' + e.message, 'err');
  }
}

function scheduleSave() {
  if (!isEditMode()) return;
  clearTimeout(SAVE_TIMER);
  setSaveStatus('編輯中…');
  SAVE_TIMER = setTimeout(saveData, 800);
}

async function saveData() {
  const token = localStorage.getItem(TOKEN_STORAGE_KEY);
  if (!token || !WEBAPP_URL) return;
  try {
    setSaveStatus('儲存中…');
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ token, data })
    });
    const result = await res.json();
    if (result.ok) {
      setSaveStatus('已儲存 ' + new Date().toLocaleTimeString(), 'ok');
    } else {
      setSaveStatus('儲存失敗：' + (result.error || '未知錯誤'), 'err');
    }
  } catch (e) {
    setSaveStatus('儲存失敗：' + e.message, 'err');
  }
}

function toggleEditMode() {
  if (!WEBAPP_URL) {
    alert('請先設定 WEBAPP_URL（部署 Apps Script 後填入 index.html）');
    return;
  }
  if (isEditMode()) {
    if (confirm('關閉編輯模式？（之後要編輯需重新輸入 Token）')) {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      applyEditModeDOM();
      setSaveStatus('已切回唯讀');
    }
  } else {
    const token = prompt('請輸入編輯 Token：');
    if (token && token.trim()) {
      localStorage.setItem(TOKEN_STORAGE_KEY, token.trim());
      applyEditModeDOM();
      setSaveStatus('編輯模式已開啟');
    }
  }
}
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function getByPath(obj, path) {
  return path.split('.').reduce((o, k) => o && o[k], obj);
}
function setByPath(obj, path, val) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => o[k], obj);
  target[last] = val;
}

function calcOverall() {
  let total = 0, done = 0;
  data.phases.forEach(p => {
    total += p.tasks.length;
    done += p.tasks.filter(t => t.status === 'done').length;
  });
  return { total, done, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}

function calcPhase(phase) {
  const total = phase.tasks.length;
  const done = phase.tasks.filter(t => t.status === 'done').length;
  const inProgress = phase.tasks.filter(t => t.status === 'in-progress').length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  let status = 'todo';
  if (done === total && total > 0) status = 'done';
  else if (done > 0 || inProgress > 0) status = 'in-progress';
  return { total, done, inProgress, pct, status };
}

function renderKPIs() {
  $('kpi-grid').innerHTML = data.phases.map(p => {
    const s = calcPhase(p);
    const shortName = p.name.replace(/^階段 \d+：/, '');
    return `
      <div class="kpi">
        <div class="kpi-title">階段 ${data.phases.indexOf(p) + 1}</div>
        <div class="kpi-name">${escapeHTML(shortName)}</div>
        <div class="kpi-percent">${s.pct}%</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${s.pct}%;background:${p.color}"></div></div>
      </div>`;
  }).join('');
}

function renderOverall() {
  const o = calcOverall();
  $('overall-text').textContent = `${o.done} / ${o.total} 任務（${o.pct}%）`;
  $('overall-fill').style.width = o.pct + '%';
}

function renderGantt() {
  const monthHeader = MONTHS.map(m => `<div>${m.split('/')[1]}月</div>`).join('');
  let html = `<div class="gantt-header"><div>階段</div>${monthHeader}</div>`;
  data.phases.forEach(p => {
    const startIdx = MONTHS.indexOf(p.start);
    const endIdx = MONTHS.indexOf(p.end);
    const s = startIdx >= 0 ? startIdx : 0;
    const e = endIdx >= 0 ? endIdx : s;
    const left = s * (100 / MONTHS.length);
    const width = (e - s + 1) * (100 / MONTHS.length);
    const shortName = p.name.replace(/^階段 \d+：/, '');
    html += `
      <div class="gantt-row">
        <div class="gantt-label">${escapeHTML(p.name)}</div>
        <div class="gantt-track">
          <div class="gantt-bar" style="background:${p.color};left:${left}%;width:${width}%">${escapeHTML(shortName)} · ${escapeHTML(p.team)}</div>
        </div>
      </div>`;
  });
  $('gantt').innerHTML = html;
}

function renderPhases() {
  $('phases').innerHTML = data.phases.map((p, pi) => {
    const s = calcPhase(p);
    const statusBadge = s.status === 'done' ? '<span class="status-badge badge-done">已完成</span>'
      : s.status === 'in-progress' ? '<span class="status-badge badge-in-progress">進行中</span>'
      : '<span class="status-badge badge-todo">待辦</span>';

    const metricsHTML = p.metrics.map((m, mi) => `
      <div class="metric">
        <span class="metric-name" contenteditable="true" data-phase-metric="${pi}.${mi}.name">${escapeHTML(m.name)}</span>
        <span class="metric-target" contenteditable="true" data-phase-metric="${pi}.${mi}.target">${escapeHTML(m.target)}</span>
      </div>`).join('');

    const tasksHTML = p.tasks.map(t => `
      <div class="task">
        <div class="task-status ${t.status}" onclick="cycleStatus('${p.id}', ${t.id})" title="點擊切換狀態"></div>
        <div class="task-content">
          <div class="task-name ${t.status === 'done' ? 'done' : ''}" contenteditable="true" data-task="${p.id}.${t.id}.name">${escapeHTML(t.name)}</div>
          <div class="task-note" contenteditable="true" data-task="${p.id}.${t.id}.note" data-placeholder="備註...">${escapeHTML(t.note || '')}</div>
        </div>
        <div class="task-delete" onclick="deleteTask('${p.id}', ${t.id})" title="刪除">×</div>
      </div>`).join('');

    const risksHTML = (p.risks || []).map((r, ri) => `
      <div class="risk-item">⚠ <span contenteditable="true" data-risk="${pi}.${ri}">${escapeHTML(r)}</span></div>`).join('');

    return `
      <div class="phase" style="border-left-color:${p.color}">
        <div class="phase-header" onclick="togglePhase('${p.id}', event)">
          <div class="phase-chevron ${p.expanded ? 'expanded' : ''}">▶</div>
          <div class="phase-title-wrap">
            <div class="phase-title" contenteditable="true" data-phase="${pi}.name" onclick="event.stopPropagation()">${escapeHTML(p.name)}</div>
            <div class="phase-sub">
              <span>📅 <span contenteditable="true" data-phase="${pi}.start" onclick="event.stopPropagation()">${escapeHTML(p.start)}</span> ~ <span contenteditable="true" data-phase="${pi}.end" onclick="event.stopPropagation()">${escapeHTML(p.end)}</span></span>
              <span>👥 <span contenteditable="true" data-phase="${pi}.team" onclick="event.stopPropagation()">${escapeHTML(p.team)}</span></span>
              ${statusBadge}
            </div>
          </div>
          <div class="phase-progress-wrap">
            <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${s.pct}%;background:${p.color}"></div></div>
            <div class="phase-progress-text">${s.pct}%</div>
          </div>
        </div>
        <div class="phase-body ${p.expanded ? 'expanded' : ''}">

          <div class="block">
            <div class="block-label">🎯 階段目標</div>
            <div class="objective-text" contenteditable="true" data-phase="${pi}.objective">${escapeHTML(p.objective)}</div>
          </div>

          <div class="block">
            <div class="block-label">📊 成效指標</div>
            <div class="metrics-list">${metricsHTML}</div>
          </div>

          <div class="block">
            <div class="block-label">
              ✅ 任務清單（${s.done}/${s.total}）
            </div>
            <div class="task-list">${tasksHTML}</div>
            <div class="add-task" onclick="addTask('${p.id}')">+ 新增任務</div>
          </div>

          <div class="block">
            <div class="block-label">⚠️ 風險與注意事項</div>
            <div class="risks">${risksHTML}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.addEventListener('blur', onEditBlur);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && !el.matches('.objective-text, .vision')) {
        e.preventDefault();
        el.blur();
      }
    });
  });
}

function onEditBlur(e) {
  const el = e.target;
  const text = el.innerText.trim();
  let changed = false;
  if (el.dataset.path) {
    setByPath(data, el.dataset.path, text);
    changed = true;
  } else if (el.dataset.phase) {
    const [pi, field] = el.dataset.phase.split('.');
    data.phases[pi][field] = text;
    if (field === 'start' || field === 'end') renderGantt();
    changed = true;
  } else if (el.dataset.task) {
    const [pid, tid, field] = el.dataset.task.split('.');
    const phase = data.phases.find(p => p.id === pid);
    const task = phase.tasks.find(t => t.id == tid);
    if (task) { task[field] = text; changed = true; }
  } else if (el.dataset.phaseMetric) {
    const [pi, mi, field] = el.dataset.phaseMetric.split('.');
    data.phases[pi].metrics[mi][field] = text;
    changed = true;
  } else if (el.dataset.risk) {
    const [pi, ri] = el.dataset.risk.split('.');
    data.phases[pi].risks[ri] = text;
    changed = true;
  }
  if (changed) scheduleSave();
}

function cycleStatus(phaseId, taskId) {
  if (!isEditMode()) return;
  const order = ['todo', 'in-progress', 'done'];
  const phase = data.phases.find(p => p.id === phaseId);
  const task = phase.tasks.find(t => t.id === taskId);
  task.status = order[(order.indexOf(task.status) + 1) % order.length];
  renderAll();
  scheduleSave();
}

function addTask(phaseId) {
  if (!isEditMode()) return;
  const phase = data.phases.find(p => p.id === phaseId);
  const nextId = Math.max(0, ...phase.tasks.map(t => t.id)) + 1;
  phase.tasks.push({ id: nextId, name: '新任務', status: 'todo', note: '' });
  renderAll();
  scheduleSave();
}

function deleteTask(phaseId, taskId) {
  if (!isEditMode()) return;
  const phase = data.phases.find(p => p.id === phaseId);
  phase.tasks = phase.tasks.filter(t => t.id !== taskId);
  renderAll();
  scheduleSave();
}

function togglePhase(phaseId, evt) {
  if (evt && evt.target.isContentEditable) return;
  const phase = data.phases.find(p => p.id === phaseId);
  phase.expanded = !phase.expanded;
  renderPhases();
}

function expandAll() {
  data.phases.forEach(p => p.expanded = true);
  renderPhases();
}
function collapseAll() {
  data.phases.forEach(p => p.expanded = false);
  renderPhases();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `AI導入專案_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const loaded = JSON.parse(evt.target.result);
      if (!loaded.phases || !Array.isArray(loaded.phases)) throw new Error('格式錯誤');
      data = loaded;
      renderAll();
      scheduleSave();
      alert('匯入成功！' + (isEditMode() ? '\n資料會自動寫回 Google Sheet。' : ''));
    } catch (err) {
      alert('匯入失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetData() {
  if (confirm('確定要還原為預設資料？所有編輯內容將會遺失。')) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    renderAll();
  }
}

function renderAll() {
  renderOverall();
  renderKPIs();
  renderGantt();
  renderPhases();
  applyEditModeDOM();
}

// 初始化：先顯示本機預設資料，再嘗試從 Google Sheet 讀最新
renderAll();
if (WEBAPP_URL) {
  loadData().then(d => {
    if (d) {
      data = d;
      renderAll();
      setSaveStatus('已載入 ' + new Date().toLocaleTimeString(), 'ok');
    }
  }).catch(err => {
    setSaveStatus('載入失敗：' + err.message + '（顯示預設資料）', 'err');
    console.error(err);
  });
} else {
  setSaveStatus('純本機模式（未設定 WEBAPP_URL）');
}
